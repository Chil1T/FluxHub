name: Repo Hygiene

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  repo-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run repository contract tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
